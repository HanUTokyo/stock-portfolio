spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:stock_portfolio}
    username: ${DB_USERNAME:stock_user}
    password: ${DB_PASSWORD:stock_password}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    org.hibernate.SQL: warn

app:
  pricing:
    timezone: ${PRICING_TIMEZONE:America/New_York}
    open-cron: ${PRICING_OPEN_CRON:0 35 9 * * MON-FRI}
    close-cron: ${PRICING_CLOSE_CRON:0 5 16 * * MON-FRI}
    yahoo-base-url: ${YAHOO_FINANCE_BASE_URL:https://query1.finance.yahoo.com}
    retry:
      max-attempts: ${PRICING_RETRY_MAX_ATTEMPTS:3}
      backoff-ms: ${PRICING_RETRY_BACKOFF_MS:1000}
